name: PWA to APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. コードのチェックアウト
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Node.js環境のセットアップ（タイポを修正）
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. Java環境（JDK 17）のセットアップ
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. PWABuilder CLIをインストール
    - name: Install PWABuilder CLI
      run: npm install -g @pwabuilder/cli

    # 5. PWAのURLからAndroidプロジェクト（APK）を自動生成
    # ※あなたのGitHub PagesのURLを直接叩いてパッケージ化します
    - name: Build APK via PWABuilder
      run: |
        pwa-cli android --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ --output ./build-output

    # 6. 生成されたAPK（および関連ファイル）をGitHub上に保存
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pwa-android-apk
        path: ./build-output/*
